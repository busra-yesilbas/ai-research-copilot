version: "3.9"

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: ai-research-copilot:latest
    container_name: ai-research-copilot-api
    ports:
      - "8000:8000"
    volumes:
      # Persist the vector index, raw PDFs, and model weights across restarts
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - LOG_FORMAT=json
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
      - INDEX_DIR=data/index
      - DATA_DIR=data
      - MODELS_DIR=models
      - EMBEDDING_MODEL_NAME=sentence-transformers/all-MiniLM-L6-v2
      - EMBEDDING_DEVICE=cpu
      - CHUNK_SIZE=512
      - CHUNK_OVERLAP=64
      - VECTOR_STORE_BACKEND=sklearn
      # Uncomment and set if using Neo4j (see neo4j service below):
      # - NEO4J_URI=bolt://neo4j:7687
      # - NEO4J_USER=neo4j
      # - NEO4J_PASSWORD=password
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Neo4j (optional — enable with: docker compose --profile graph up) ──────
  neo4j:
    image: neo4j:5.20-community
    container_name: ai-research-copilot-neo4j
    profiles:
      - graph
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  neo4j-data:
  neo4j-logs:
